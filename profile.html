<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Профил - Bozorcha</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        :root {
            --bg: #f8fafc;
            --bg-card: #ffffff;
            --text: #0f172a;
            --text-light: #475569;
            --text-muted: #64748b;
            --accent: #ff9800;
            --accent-light: #fff3e0;
            --accent-dark: #f57c00;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 30px rgba(0,0,0,0.05);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --gradient: linear-gradient(135deg, #ff9800, #ff6b6b);
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --bg-card: #1e293b;
            --text: #f1f5f9;
            --text-light: #94a3b8;
            --text-muted: #64748b;
            --border: #334155;
        }

        body {
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
            min-height: 100vh;
            padding-bottom: 20px;
        }

        /* Header */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .page-title {
            font-size: 24px;
            font-weight: 700;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 16px;
        }

        .header-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--bg);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--text);
        }

        .header-btn:hover {
            background: var(--accent-light);
            color: var(--accent);
            transform: scale(1.05);
        }

        /* Profile Header */
        .profile-header {
            background: var(--gradient);
            padding: 40px 20px 30px;
            text-align: center;
            color: white;
            border-radius: 0 0 30px 30px;
            position: relative;
            margin-bottom: 20px;
        }

        .profile-avatar {
            position: relative;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: white;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-size: 40px;
            border: 4px solid rgba(255,255,255,0.3);
            box-shadow: var(--shadow-lg);
        }

        .profile-name {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .profile-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(5px);
            margin-bottom: 15px;
        }

        .profile-status.verified { background: #10b981; color: white; }
        .profile-status.pending { background: #f59e0b; color: white; }
        .profile-status.unverified { background: #ef4444; color: white; }

        /* Action Buttons */
        .action-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 20px 16px;
        }

        .action-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-sm);
        }

        .action-btn:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
            box-shadow: var(--shadow-md);
        }

        .action-icon {
            font-size: 24px;
            color: var(--accent);
            margin-bottom: 8px;
        }

        .action-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
        }

        /* Shop Selector */
        .shop-selector {
            padding: 0 16px;
            margin-bottom: 20px;
        }

        .shop-selector-btn {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .shop-selector-btn:hover {
            border-color: var(--accent);
        }

        .shop-selector-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .shop-selector-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: var(--accent-light);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-size: 20px;
        }

        .shop-selector-info {
            text-align: left;
        }

        .shop-selector-name {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .shop-selector-count {
            font-size: 12px;
            color: var(--text-light);
        }

        .shop-selector-arrow {
            color: var(--text-light);
            transition: transform 0.3s;
        }

        .shop-selector-arrow.rotated {
            transform: rotate(180deg);
        }

        /* Shops List */
        .shops-list {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            margin: 10px 16px 20px;
            padding: 8px;
            display: none;
        }

        .shops-list.show {
            display: block;
        }

        .shop-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 12px;
        }

        .shop-item:last-child {
            border-bottom: none;
        }

        .shop-item:hover {
            background: var(--accent-light);
        }

        .shop-item.active {
            background: var(--accent-light);
            color: var(--accent);
        }

        .shop-item-avatar {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--accent-light);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-size: 20px;
        }

        .shop-item-name {
            flex: 1;
            font-weight: 500;
        }

        .shop-item-status {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .shop-item-status.verified { background: var(--success); }
        .shop-item-status.pending { background: var(--warning); }
        .shop-item-status.unverified { background: var(--danger); }

        .add-shop-btn {
            width: 100%;
            padding: 16px;
            background: var(--bg);
            border: 2px dashed var(--border);
            border-radius: 16px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }

        .add-shop-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Profile Info */
        .info-section {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 20px;
            margin: 0 16px 20px;
            border: 1px solid var(--border);
        }

        .info-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--accent);
        }

        .info-row {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            width: 100px;
            color: var(--text-light);
            font-size: 14px;
        }

        .info-value {
            flex: 1;
            font-weight: 500;
        }

        .phone-item {
            display: flex;
            align-items: center;
            padding: 8px 0;
        }

        .phone-number {
            flex: 1;
        }

        .phone-badge {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 20px;
            background: var(--accent-light);
            color: var(--accent);
            margin-left: 8px;
        }

        .phone-extra-toggle {
            color: var(--text-light);
            cursor: pointer;
            transition: transform 0.3s;
            margin-left: 8px;
        }

        .phone-extra-toggle.rotated {
            transform: rotate(180deg);
        }

        .extra-phones {
            display: none;
            padding-left: 20px;
            margin-top: 5px;
        }

        .extra-phones.show {
            display: block;
        }

        /* Logout Button */
        .logout-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 30px 16px;
            padding: 16px;
            background: var(--bg-card);
            border: 1px solid var(--danger);
            border-radius: 16px;
            color: var(--danger);
            cursor: pointer;
            transition: all 0.3s ease;
            justify-content: center;
            font-weight: 600;
        }

        .logout-btn:hover {
            background: var(--danger);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(239,68,68,0.3);
        }
    </style>
</head>
<body data-theme="light">
    <!-- Header -->
    <div class="page-header">
        <div class="page-title">Профил</div>
        <div class="header-actions">
            <div class="header-btn" onclick="window.parent.postMessage({ type: 'openSettings' }, '*')">
                <i class="fas fa-cog"></i>
            </div>
        </div>
    </div>

    <!-- Profile Header -->
    <div class="profile-header">
        <div class="profile-avatar">
            <i class="fas fa-store"></i>
        </div>
        <div class="profile-name" id="profileName"></div>
        <div class="profile-status" id="profileStatus"></div>
    </div>

    <!-- Action Buttons -->
    <div class="action-buttons">
        <div class="action-btn" id="editProfileBtn">
            <div class="action-icon"><i class="fas fa-pen"></i></div>
            <div class="action-label" id="editLabel">Таҳрири профил</div>
        </div>
        <div class="action-btn" id="otherShopsBtn">
            <div class="action-icon"><i class="fas fa-store-alt"></i></div>
            <div class="action-label" id="otherLabel">Дигар мағоза</div>
        </div>
        <div class="action-btn" id="sendShopBtn">
            <div class="action-icon"><i class="fas fa-share-alt"></i></div>
            <div class="action-label" id="sendLabel">Фиристодан</div>
        </div>
    </div>

    <!-- Shop Selector (for mobile) -->
    <div class="shop-selector">
        <div class="shop-selector-btn" id="shopSelectorBtn">
            <div class="shop-selector-left">
                <div class="shop-selector-icon"><i class="fas fa-store"></i></div>
                <div class="shop-selector-info">
                    <div class="shop-selector-name" id="currentShopName">Мағозаи ман</div>
                    <div class="shop-selector-count" id="shopCount">0 мағоза</div>
                </div>
            </div>
            <i class="fas fa-chevron-down shop-selector-arrow" id="shopSelectorArrow"></i>
        </div>
    </div>

    <!-- Shops List (hidden by default) -->
    <div class="shops-list" id="shopsList"></div>

    <!-- Profile Info -->
    <div class="info-section">
        <div class="info-title"><i class="fas fa-user"></i> Маълумоти шахсӣ</div>
        <div class="info-row">
            <span class="info-label">Ном</span>
            <span class="info-value" id="displayName"></span>
        </div>
        <div class="info-row">
            <span class="info-label">Рақам</span>
            <span class="info-value" id="displayPhone"></span>
        </div>
        <div class="info-row" id="extraPhonesRow">
            <span class="info-label">Рақамҳои иловагӣ</span>
            <div class="info-value">
                <div id="extraPhonesList"></div>
                <i class="fas fa-chevron-down phone-extra-toggle" id="extraPhonesToggle"></i>
            </div>
        </div>
        <div class="extra-phones" id="extraPhonesContainer"></div>
        <div class="info-row">
            <span class="info-label">Почта</span>
            <span class="info-value" id="displayEmail"></span>
        </div>
    </div>

    <div class="info-section">
        <div class="info-title"><i class="fas fa-store"></i> Маълумоти мағоза</div>
        <div class="info-row">
            <span class="info-label">Ном</span>
            <span class="info-value" id="displayShopName"></span>
        </div>
        <div class="info-row">
            <span class="info-label">Суроға</span>
            <span class="info-value" id="displayAddress"></span>
        </div>
    </div>

    <!-- Logout Button -->
    <div class="logout-btn" id="logoutBtn">
        <i class="fas fa-sign-out-alt"></i>
        <span>Баромадан аз ҳисоб</span>
    </div>

    <script>
        const _supabase = supabase.createClient(
            'https://seagtlaujnnhoyitgsdd.supabase.co',
            'sb_publishable_OlLChtOja0i8nIrPZuM_Og_vyfGjfsP'
        );

        let currentUser = null;
        let currentShop = null;
        let userShops = [];
        let extraPhonesVisible = false;

        let currentLang = localStorage.getItem('lang') || 'tj';
        let currentTheme = localStorage.getItem('theme') || 'light';

        document.body.setAttribute('data-theme', currentTheme);

        const i18n = {
            tj: {
                edit: "Таҳрири профил",
                other: "Дигар мағоза",
                send: "Фиристодан",
                logout: "Баромадан аз ҳисоб",
                confirmLogout: "Оё шумо боварӣ доред, ки мехоҳед бароед?",
                shops: "мағоза",
                noShops: "мағоз нест",
                verified: "Тасдиқшуда",
                pending: "Дар ҳоли тасдиқ",
                unverified: "Тасдиқнашуда",
                extraPhones: "Рақамҳои иловагӣ",
                main: "Асосӣ",
                extra: "Иловагӣ"
            },
            ru: {
                edit: "Редактировать профиль",
                other: "Другие магазины",
                send: "Поделиться",
                logout: "Выйти",
                confirmLogout: "Вы уверены, что хотите выйти?",
                shops: "магазинов",
                noShops: "нет магазинов",
                verified: "Подтвержден",
                pending: "На проверке",
                unverified: "Не подтвержден",
                extraPhones: "Доп. номера",
                main: "Основной",
                extra: "Доп."
            },
            en: {
                edit: "Edit profile",
                other: "Other shops",
                send: "Share",
                logout: "Logout",
                confirmLogout: "Are you sure you want to logout?",
                shops: "shops",
                noShops: "no shops",
                verified: "Verified",
                pending: "Pending",
                unverified: "Unverified",
                extraPhones: "Extra phones",
                main: "Main",
                extra: "Extra"
            }
        };

        applyLang(currentLang);

        function applyLang(lang) {
            const d = i18n[lang];
            document.getElementById('editLabel').innerText = d.edit;
            document.getElementById('otherLabel').innerText = d.other;
            document.getElementById('sendLabel').innerText = d.send;
            document.querySelector('.logout-btn span').innerText = d.logout;
        }

        window.addEventListener('message', function(event) {
            if (event.data.type === 'theme') {
                document.body.setAttribute('data-theme', event.data.theme);
            }
        });

        document.addEventListener('DOMContentLoaded', async () => {
            const userId = localStorage.getItem('userId');
            if (!userId) {
                window.location.href = 'index.html';
                return;
            }
            await loadUserData();
            await loadUserShops();
        });

        async function loadUserData() {
            const userId = localStorage.getItem('userId');
            
            const { data, error } = await _supabase
                .from('user')
                .select('*')
                .eq('id', userId)
                .single();

            if (error) {
                console.error('Error loading user:', error);
                return;
            }

            currentUser = data;

            // Маълумоти асосӣ
            document.getElementById('profileName').innerText = data.full_name || 'Корбар';
            document.getElementById('displayName').innerText = data.full_name || '-';
            document.getElementById('displayPhone').innerText = data.phone || '-';
            document.getElementById('displayEmail').innerText = data.email || '-';
            document.getElementById('displayShopName').innerText = data.shop_name || '-';

            // Суроға
            if (data.shop_address) {
                try {
                    const address = JSON.parse(data.shop_address);
                    document.getElementById('displayAddress').innerText = address.full_address || '-';
                } catch {
                    document.getElementById('displayAddress').innerText = data.shop_address || '-';
                }
            } else {
                document.getElementById('displayAddress').innerText = '-';
            }

            // Статус
            const statusEl = document.getElementById('profileStatus');
            if (data.moderation_status === 'approved') {
                statusEl.innerText = i18n[currentLang].verified;
                statusEl.className = 'profile-status verified';
            } else if (data.moderation_status === 'pending') {
                statusEl.innerText = i18n[currentLang].pending;
                statusEl.className = 'profile-status pending';
            } else {
                statusEl.innerText = i18n[currentLang].unverified;
                statusEl.className = 'profile-status unverified';
            }

            // Рақамҳои иловагӣ
            if (data.extra_phones && data.extra_phones.length > 0) {
                displayExtraPhones(data.extra_phones);
            } else {
                document.getElementById('extraPhonesRow').style.display = 'none';
            }
        }

        async function loadUserShops() {
            const userId = localStorage.getItem('userId');
            
            const { data, error } = await _supabase
                .from('shops')
                .select('*')
                .eq('user_id', userId);

            if (error) {
                console.error('Error loading shops:', error);
                return;
            }

            userShops = data || [];
            
            // Агар мағозаи ҷорӣ дар localStorage нигоҳ дошта нашуда бошад, аввалинро гиред
            let currentShopId = localStorage.getItem('currentShopId');
            if (!currentShopId && userShops.length > 0) {
                currentShopId = userShops[0].id;
                localStorage.setItem('currentShopId', currentShopId);
            }

            if (currentShopId) {
                currentShop = userShops.find(s => s.id === currentShopId) || userShops[0];
            }

            updateShopSelector();
        }

        function updateShopSelector() {
            const count = userShops.length;
            const shopCountEl = document.getElementById('shopCount');
            shopCountEl.innerText = count === 0 ? i18n[currentLang].noShops : `${count} ${i18n[currentLang].shops}`;

            if (currentShop) {
                document.getElementById('currentShopName').innerText = currentShop.shop_name || 'Мағозаи ман';
            }

            // Сохтани рӯйхати мағозаҳо
            const listEl = document.getElementById('shopsList');
            listEl.innerHTML = '';

            userShops.forEach(shop => {
                const statusClass = shop.moderation_status === 'approved' ? 'verified' : 
                                   shop.moderation_status === 'pending' ? 'pending' : 'unverified';
                
                const div = document.createElement('div');
                div.className = `shop-item ${shop.id === currentShop?.id ? 'active' : ''}`;
                div.onclick = () => switchShop(shop.id);
                div.innerHTML = `
                    <div class="shop-item-avatar"><i class="fas fa-store"></i></div>
                    <div class="shop-item-name">${shop.shop_name || 'Мағозаи ман'}</div>
                    <span class="shop-item-status ${statusClass}"></span>
                `;
                listEl.appendChild(div);
            });

            // Тугмаи иловаи мағоза
            const addBtn = document.createElement('div');
            addBtn.className = 'add-shop-btn';
            addBtn.onclick = addNewShop;
            addBtn.innerHTML = '<i class="fas fa-plus"></i> Иловаи мағозаи нав';
            listEl.appendChild(addBtn);
        }

        function displayExtraPhones(phones) {
            const container = document.getElementById('extraPhonesContainer');
            container.innerHTML = '';
            
            phones.forEach((phone, index) => {
                const div = document.createElement('div');
                div.className = 'phone-item';
                div.innerHTML = `
                    <span class="phone-number">${phone}</span>
                    <span class="phone-badge">${i18n[currentLang].extra}</span>
                `;
                container.appendChild(div);
            });

            document.getElementById('extraPhonesList').innerHTML = 
                `<span>${phones.length} ${i18n[currentLang].extraPhones}</span>`;
        }

        // Toggle extra phones
        document.getElementById('extraPhonesToggle').onclick = () => {
            extraPhonesVisible = !extraPhonesVisible;
            document.getElementById('extraPhonesContainer').classList.toggle('show', extraPhonesVisible);
            document.getElementById('extraPhonesToggle').classList.toggle('rotated', extraPhonesVisible);
        };

        // Toggle shops list
        document.getElementById('shopSelectorBtn').onclick = () => {
            const list = document.getElementById('shopsList');
            const arrow = document.getElementById('shopSelectorArrow');
            list.classList.toggle('show');
            arrow.classList.toggle('rotated');
        };

        function switchShop(shopId) {
            localStorage.setItem('currentShopId', shopId);
            window.location.reload();
        }

        function addNewShop() {
            window.location.href = 'choose-method.html?mode=newshop';
        }

        // Action buttons
        document.getElementById('editProfileBtn').onclick = () => {
            window.location.href = 'profile-edit.html';
        };

        document.getElementById('otherShopsBtn').onclick = () => {
            document.getElementById('shopSelectorBtn').click();
        };

        document.getElementById('sendShopBtn').onclick = () => {
            if (currentShop) {
                window.location.href = `send-shope.html?id=${currentShop.id}`;
            } else {
                alert('Ягон мағоза интихоб нашудааст');
            }
        };

        // Logout
        document.getElementById('logoutBtn').onclick = () => {
            if (confirm(i18n[currentLang].confirmLogout)) {
                localStorage.clear();
                window.location.href = 'index.html';
            }
        };
    </script>
</body>
</html>
