<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bozorcha - Асосӣ</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        h1 { color: #ff9500; margin-bottom: 30px; font-size: 2.5rem; }
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            background: #ff9500;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        .btn:active { transform: scale(0.98); }
        .btn-outline {
            background: transparent;
            border: 2px solid #ff9500;
            color: #ff9500;
        }
        .status {
            margin-top: 30px;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            font-size: 14px;
            color: #94a3b8;
            border: 1px solid rgba(255,149,0,0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bozorcha</h1>
        
        <button class="btn" id="sellerBtn">Фурӯшанда</button>
        <button class="btn btn-outline" id="buyerBtn">Харидор</button>
        
        <div class="status" id="status">Санҷиши система...</div>
    </div>

    <script>
        // Ислоҳи номгузорӣ: истифодаи 'supabaseClient' ба ҷои 'supabase'
        const supabaseUrl = 'https://seagtlaujnnhoyitgsdd.supabase.co';
        const supabaseKey = 'sb_publishable_OlLChtOja0i8nIrPZuM_Og_vyfGjfsP';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        async function checkConnection() {
            try {
                // Санҷиши оддӣ барои тасдиқи пайвастшавӣ
                const { data, error } = await supabaseClient.from('profiles').select('*').limit(1);
                
                const statusElement = document.getElementById('status');
                if (error) {
                    statusElement.innerHTML = '⚠️ Пайвастшавӣ ҳаст, вале хатогии база: ' + error.message;
                    statusElement.style.color = '#ef4444';
                } else {
                    statusElement.innerHTML = '✅ Система фаъол аст';
                    statusElement.style.color = '#10b981';
                }
            } catch (err) {
                document.getElementById('status').innerHTML = '❌ Хатогии пайвастшавӣ ба сервер';
            }
        }

        // Функсияҳои гузариш (Navigation)
        document.getElementById('sellerBtn').addEventListener('click', () => {
            window.location.href = './src/pages/auth/s/method.html';
        });

        document.getElementById('buyerBtn').addEventListener('click', () => {
            window.location.href = './src/pages/auth/b/method.html';
        });

        // Оғози санҷиш
        checkConnection();
    </script>
</body>
</html>
