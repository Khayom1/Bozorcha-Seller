<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bozorcha - Санҷиш</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0a0a0a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        h1 { color: #ff9500; margin-bottom: 30px; font-size: 2.5rem; }
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #ff9500;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover { opacity: 0.8; }
        .btn-outline {
            background: transparent;
            border: 2px solid #ff9500;
            color: #ff9500;
        }
        .status {
            margin-top: 20px;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            font-size: 14px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bozorcha</h1>
        
        <button class="btn" id="sellerBtn">Фурӯшанда</button>
        <button class="btn btn-outline" id="buyerBtn">Харидор</button>
        
        <div class="status" id="status">Система омода аст</div>
    </div>

    <script>
        // Танзимоти Supabase бо номи тағйирёбандаи дуруст
        const supabaseUrl = 'https://seagtlaujnnhoyitgsdd.supabase.co';
        const supabaseKey = 'sb_publishable_OlLChtOja0i8nIrPZuM_Og_vyfGjfsP';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        // Функсия барои санҷиши пайвастшавӣ
        async function checkConnection() {
            try {
                const { data, error } = await supabaseClient.from('profiles').select('count').limit(1);
                const statusDiv = document.getElementById('status');
                
                if (error) {
                    statusDiv.innerHTML = '❌ Хатогӣ дар база: ' + error.message;
                } else {
                    statusDiv.innerHTML = '✅ Пайвастшавӣ ба Supabase муваффақ';
                }
            } catch (err) {
                document.getElementById('status').innerHTML = '❌ Хатогии сервер: ' + err.message;
            }
        }

        // Функсияҳои гузариш (Navigation) мувофиқи сохтори файлҳо
        document.getElementById('sellerBtn').addEventListener('click', function() {
            // Гузариш ба қисми фурӯшанда
            window.location.href = "src/pages/auth/s/method.html";
        });

        document.getElementById('buyerBtn').addEventListener('click', function() {
            // Гузариш ба қисми харидор
            window.location.href = "src/pages/auth/b/method.html";
        });

        // Иҷрои санҷиш ҳангоми боршавӣ
        checkConnection();
    </script>
</body>
</html>
