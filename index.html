<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bozorcha — Интихоби Нақш</title>
</head>
<body>

    <div id="app">
        <h1>Хуш омадед ба Bozorcha</h1>
        <p>Лутфан яке аз роҳҳоро интихоб кунед:</p>

        <button id="btn-buyer" style="padding: 20px; margin: 10px; cursor: pointer;">
            🛍️ Ман Харидор ҳастам
        </button>

        <button id="btn-seller" style="padding: 20px; margin: 10px; cursor: pointer;">
            🏪 Ман Фурӯшанда ҳастам
        </button>
    </div>

    <script src="src/js/config.js"></script>

    <script>
        // Интихоби Харидор
        document.getElementById('btn-buyer').addEventListener('click', () => {
            localStorage.setItem('user_role', 'buyer');
            window.location.href = 'method-login-boyer.html';
        });

        // Интихоби Фурӯшанда
        document.getElementById('btn-seller').addEventListener('click', () => {
            localStorage.setItem('user_role', 'seller');
            window.location.href = 'method-login-seller.html';
        });
    </script>

</body>
</html>
