<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Профил - Bozorcha</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FFFFFF;
            --surface: #F8F9FA;
            --text-primary: #1A1C1E;
            --text-secondary: #6C757D;
            --accent-gradient: linear-gradient(135deg, #FF9F43 0%, #FF6B6B 100%);
            --border: #EEEEEE;
            --shadow: 0 15px 35px rgba(0,0,0,0.05);
            --input-bg: #FFFFFF;
        }

        [data-theme="dark"] {
            --bg: #0A0A0B;
            --surface: #161618;
            --text-primary: #F8F9FA;
            --text-secondary: #ADB5BD;
            --border: #2C2E33;
            --shadow: 0 15px 35px rgba(0,0,0,0.3);
            --input-bg: #1A1C1E;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; transition: background-color 0.4s ease, color 0.4s ease; }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px;
        }

        /* Аниматсияи Логотип */
        .awning-part { transform-origin: top center; animation: windSwing 3s ease-in-out infinite; }
        @keyframes windSwing { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(3deg) skewX(2deg); } }

        .card {
            background: var(--surface); border-radius: 35px; padding: 40px 30px;
            box-shadow: var(--shadow); border: 1px solid var(--border);
            max-width: 450px; width: 100%; position: relative;
        }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .controls { display: flex; gap: 10px; }

        .icon-btn {
            width: 44px; height: 44px; border-radius: 14px;
            background: var(--bg); border: 1px solid var(--border);
            cursor: pointer; display: flex; justify-content: center; align-items: center;
            font-size: 18px; position: relative;
        }

        /* Dropdown Забон */
        .dropdown { position: relative; }
        .dropdown-menu {
            position: absolute; top: 55px; right: 0;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 15px; box-shadow: var(--shadow);
            display: none; flex-direction: column; overflow: hidden; z-index: 100; min-width: 130px;
        }
        .dropdown-menu.show { display: flex; }
        .dropdown-item { padding: 12px; cursor: pointer; font-weight: 600; font-size: 14px; display: flex; gap: 8px; color: var(--text-primary); }
        .dropdown-item:hover { background: var(--accent-gradient); color: white; }

        .title { font-size: 24px; font-weight: 800; margin-bottom: 8px; text-align: left; }
        .subtitle { color: var(--text-secondary); font-size: 14px; margin-bottom: 30px; text-align: left; line-height: 1.5; }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 700; font-size: 13px; color: var(--text-secondary); text-transform: uppercase; }
        
        input {
            width: 100%; padding: 16px; border-radius: 18px;
            border: 2px solid var(--border); background: var(--input-bg);
            color: var(--text-primary); font-size: 16px; outline: none;
        }
        input:focus { border-color: #FF9F43; }

        .btn {
            width: 100%; padding: 20px; border-radius: 20px;
            font-size: 16px; font-weight: 800; border: none; cursor: pointer;
            background: var(--accent-gradient); color: white;
            box-shadow: 0 10px 20px rgba(255, 107, 107, 0.2); margin-top: 10px;
        }
        .btn:active { transform: scale(0.98); }

        footer { margin-top: 30px; color: var(--text-secondary); font-size: 12px; text-align: center; }
    </style>
</head>
<body data-theme="light">

    <div class="card">
        <header>
            <svg width="45" height="45" viewBox="0 0 200 200">
                <path class="awning-part" d="M 10 60 C 30 10 140 0 185 60 L 185 85 A 28.5 28.5 0 0 1 126.6 85 A 28.5 28.5 0 0 1 68.3 85 A 28.5 28.5 0 0 1 10 85 L 10 60 Z" fill="#FF9F43"/>
                <path d="M 25 105 Q 65 140 25 195 L 25 105 Z" fill="#FF6B6B"/>
                <path d="M 90 120 L 125 120 Q 125 160 160 130 Q 195 160 150 195 Q 80 200 90 120 Z" fill="#FF9F43"/>
            </svg>
            <div class="controls">
                <div class="dropdown">
                    <button class="icon-btn" id="langBtn">🇹🇯</button>
                    <div class="dropdown-menu" id="langMenu">
                        <div class="dropdown-item" onclick="setLang('tj')">🇹🇯 Тоҷикӣ</div>
                        <div class="dropdown-item" onclick="setLang('ru')">🇷🇺 Русский</div>
                        <div class="dropdown-item" onclick="setLang('en')">🇬🇧 English</div>
                    </div>
                </div>
                <button class="icon-btn" id="themeBtn">🌙</button>
            </div>
        </header>

        <h1 class="title" id="t-title">Маълумоти профил</h1>
        <p class="subtitle" id="t-sub">Барои идома додани тиҷорат маълумоти худро пур кунед.</p>

        <div class="input-group">
            <label id="l-name">Ном ва Насаб</label>
            <input type="text" id="fullName" placeholder="Алишер Сафаров">
        </div>

        <div class="input-group">
            <label id="l-shop">Номи мағоза</label>
            <input type="text" id="shopName" placeholder="Bozorcha Center">
        </div>

        <div class="input-group">
            <label id="l-addr">Суроғаи мағоза</label>
            <input type="text" id="shopAddress" placeholder="к. Рудакӣ, 15">
        </div>

        <button class="btn" id="saveBtn">Сабт кардан</button>

        <footer id="t-foot">© 2026 Bozorcha. Ҳамаи ҳуқуқҳо ҳифз шудаанд.</footer>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const _supabase = supabase.createClient('https://seagtlaujnnhoyitgsdd.supabase.co', 'sb_publishable_OlLChtOja0i8nIrPZuM_Og_vyfGjfsP');
        const BOT_TOKEN = "8732575801:AAHMKSQF8wgs9BeNBhCnFfigzvTmB0iM5Js";
        const ADMIN_ID = "6484601057";

        const i18n = {
            tj: { flag: "🇹🇯", title: "Маълумоти профил", sub: "Барои идома додани тиҷорат маълумоти худро пур кунед.", name: "Ном ва Насаб", shop: "Номи мағоза", addr: "Суроғаи мағоза", btn: "Сабт кардан", foot: "© 2026 Bozorcha. Ҳамаи ҳуқуқҳо ҳифз шудаанд." },
            ru: { flag: "🇷🇺", title: "Профиль продавца", sub: "Заполните данные, чтобы начать продавать.", name: "Имя и Фамилия", shop: "Название магазина", addr: "Адрес магазина", btn: "Сохранить", foot: "© 2026 Bozorcha. Все права защищены." },
            en: { flag: "🇬🇧", title: "Seller Profile", sub: "Complete your profile to start business.", name: "Full Name", shop: "Shop Name", addr: "Shop Address", btn: "Save Profile", foot: "© 2026 Bozorcha. All rights reserved." }
        };

        // Танзими забон
        function setLang(lang) {
            const d = i18n[lang];
            document.getElementById('langBtn').innerText = d.flag;
            document.getElementById('t-title').innerText = d.title;
            document.getElementById('t-sub').innerText = d.sub;
            document.getElementById('l-name').innerText = d.name;
            document.getElementById('l-shop').innerText = d.shop;
            document.getElementById('l-addr').innerText = d.addr;
            document.getElementById('saveBtn').innerText = d.btn;
            document.getElementById('t-foot').innerText = d.foot;
            localStorage.setItem('lang', lang);
            document.getElementById('langMenu').classList.remove('show');
        }

        document.getElementById('langBtn').onclick = (e) => {
            e.stopPropagation();
            document.getElementById('langMenu').classList.toggle('show');
        };

        document.getElementById('themeBtn').onclick = () => {
            const theme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', theme);
            document.getElementById('themeBtn').innerText = theme === 'light' ? '🌙' : '☀️';
            localStorage.setItem('theme', theme);
        };

        window.onload = () => {
            setLang(localStorage.getItem('lang') || 'tj');
            const theme = localStorage.getItem('theme') || 'light';
            document.body.setAttribute('data-theme', theme);
            document.getElementById('themeBtn').innerText = theme === 'light' ? '🌙' : '☀️';
        };

        async function notifyTelegram(name, shop, address) {
            const email = localStorage.getItem('temp_email') || 'N/A';
            const text = `📝 **Профили нав пур карда шуд!**\n\n👤 Фурӯшанда: ${name}\n📧 Почта: ${email}\n🏪 Мағоза: ${shop}\n📍 Суроға: ${address}`;
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ADMIN_ID}&text=${encodeURIComponent(text)}&parse_mode=Markdown`);
        }

        document.getElementById('saveBtn').onclick = async () => {
            const fullName = document.getElementById('fullName').value.trim();
            const shopName = document.getElementById('shopName').value.trim();
            const shopAddress = document.getElementById('shopAddress').value.trim();
            const userId = localStorage.getItem('userId');

            if(!fullName || !shopName || !shopAddress) return alert("Пур кунед!");

            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            btn.innerText = "...";

            const { error } = await _supabase.from('user').upsert({ id: userId, full_name: fullName, shop_name: shopName, shop_address: shopAddress });

            if (error) {
                alert(error.message);
                btn.disabled = false;
            } else {
                await notifyTelegram(fullName, shopName, shopAddress);
                window.location.href = 'dashboard.html';
            }
        };

        window.onclick = () => document.getElementById('langMenu').classList.remove('show');
    </script>
</body>
</html>
