<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Воридшавӣ - Bozorcha</title>
    <style>
        :root {
            --bg: #FFFFFF;
            --surface: #F8F9FA;
            --text-primary: #1A1C1E;
            --text-secondary: #6C757D;
            --accent-gradient: linear-gradient(135deg, #FF9F43 0%, #FF6B6B 100%);
            --border: #EEEEEE;
            --shadow: 0 15px 35px rgba(0,0,0,0.05);
        }

        [data-theme="dark"] {
            --bg: #0A0A0B;
            --surface: #161618;
            --text-primary: #F8F9FA;
            --text-secondary: #ADB5BD;
            --border: #2C2E33;
            --shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; transition: background-color 0.4s ease, color 0.4s ease; }

        body {
            background-color: var(--bg); color: var(--text-primary);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px;
        }

        /* Аниматсияи Логотип */
        .awning-part { transform-origin: top center; animation: windSwing 3s ease-in-out infinite; }
        @keyframes windSwing { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(3deg) skewX(2deg); } }

        .card {
            background: var(--surface); border-radius: 35px; padding: 40px 30px;
            box-shadow: var(--shadow); border: 1px solid var(--border);
            max-width: 400px; width: 100%; position: relative; text-align: center;
        }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 35px; }
        .header-left { display: flex; align-items: center; gap: 12px; }

        .controls { display: flex; gap: 8px; }
        .icon-btn {
            width: 44px; height: 44px; border-radius: 14px;
            background: var(--bg); border: 1px solid var(--border);
            cursor: pointer; display: flex; justify-content: center; align-items: center;
            font-size: 18px; position: relative; overflow: hidden;
        }

        .theme-icon-box { position: relative; width: 20px; height: 20px; }
        .sun, .moon { position: absolute; inset: 0; transition: all 0.5s cubic-bezier(0.6, -0.28, 0.735, 0.045); }
        [data-theme="light"] .sun { transform: translateY(0); opacity: 1; }
        [data-theme="light"] .moon { transform: translateY(25px); opacity: 0; }
        [data-theme="dark"] .sun { transform: translateY(-25px); opacity: 0; }
        [data-theme="dark"] .moon { transform: translateY(0); opacity: 1; }

        .dropdown { position: relative; }
        .dropdown-menu {
            position: absolute; top: 50px; right: 0;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 15px; box-shadow: var(--shadow);
            display: none; flex-direction: column; overflow: hidden; z-index: 100; min-width: 120px;
        }
        .dropdown-menu.show { display: flex; }
        .dropdown-item { padding: 12px; cursor: pointer; font-weight: 600; font-size: 14px; display: flex; gap: 8px; }
        .dropdown-item:hover { background: var(--accent-gradient); color: white; }

        .title { font-size: 22px; font-weight: 800; margin-bottom: 8px; text-align: left; }
        .subtitle { color: var(--text-secondary); font-size: 14px; margin-bottom: 30px; text-align: left; line-height: 1.4; }

        .input-group { margin-bottom: 10px; text-align: left; }
        .custom-input {
            display: flex; align-items: center; background: var(--bg);
            border: 2px solid var(--border); border-radius: 20px; padding: 5px;
        }
        .custom-input:focus-within { border-color: #FF9F43; }
        .custom-input input { 
            flex: 1; padding: 15px; border: none; outline: none; 
            background: transparent; color: var(--text-primary); 
            font-size: 16px; font-weight: 600; 
        }

        .otp-input { text-align: center; letter-spacing: 10px; font-size: 22px !important; }

        .btn {
            width: 100%; padding: 20px; border-radius: 20px;
            font-size: 16px; font-weight: 700; border: none; cursor: pointer;
            margin-top: 20px; transition: transform 0.2s, opacity 0.3s;
        }
        .btn-primary { background: var(--accent-gradient); color: white; box-shadow: 0 10px 20px rgba(255, 107, 107, 0.2); }
        .btn-primary:disabled { opacity: 0.5; pointer-events: none; }

        #otp-section { display: none; }
        .error-message { color: #ff4444; font-size: 13px; margin-top: 5px; display: none; }
        footer { margin-top: 40px; color: var(--text-secondary); font-size: 12px; }
    </style>
</head>
<body data-theme="light">
    <div class="card">
        <header>
            <div class="header-left">
                <svg width="45" height="45" viewBox="0 0 200 200">
                    <path class="awning-part" d="M 10 60 C 30 10 140 0 185 60 L 185 85 A 28.5 28.5 0 0 1 126.6 85 A 28.5 28.5 0 0 1 68.3 85 A 28.5 28.5 0 0 1 10 85 L 10 60 Z" fill="#f4ce9b"/>
                    <path d="M 25 105 Q 65 140 25 195 L 25 105 Z" fill="#eea54a"/>
                    <path d="M 90 120 L 125 120 Q 125 160 160 130 Q 195 160 150 195 Q 80 200 90 120 Z" fill="#e45d27"/>
                </svg>
            </div>
            <div class="controls">
                <div class="dropdown">
                    <button class="icon-btn" id="langBtn">🇹🇯</button>
                    <div class="dropdown-menu" id="langMenu">
                        <div class="dropdown-item" onclick="setLang('tj')">🇹🇯 Тоҷикӣ</div>
                        <div class="dropdown-item" onclick="setLang('ru')">🇷🇺 Русский</div>
                        <div class="dropdown-item" onclick="setLang('en')">🇬🇧 English</div>
                    </div>
                </div>
                <button class="icon-btn" id="themeBtn">
                    <div class="theme-icon-box">
                        <span class="sun">☀️</span>
                        <span class="moon">🌙</span>
                    </div>
                </button>
            </div>
        </header>

        <div id="email-section">
            <h1 class="title" id="t-title">Воридшавӣ</h1>
            <p class="subtitle" id="t-sub">Почтаи электронии худро ворид кунед</p>
            <div class="input-group">
                <div class="custom-input">
                    <input type="email" id="email" placeholder="example@mail.com">
                </div>
                <div id="email-error" class="error-message">Почта нодуруст аст</div>
            </div>
            <button class="btn btn-primary" id="sendBtn">Фиристодани код</button>
        </div>

        <div id="otp-section">
            <h1 class="title" id="t-otp-title">Тасдиқи код</h1>
            <p class="subtitle" id="t-otp-sub">Коди 6-рақамаро аз почта ворид кунед</p>
            <div class="input-group">
                <div class="custom-input">
                    <input type="text" id="otp" class="otp-input" placeholder="000000" maxlength="6">
                </div>
                <div id="otp-error" class="error-message">Код нодуруст аст</div>
            </div>
            <button class="btn btn-primary" id="verifyBtn">Тасдиқ кардан</button>
        </div>

        <footer id="t-foot">© 2026 Bozorcha. Ҳамаи ҳуқуқҳо ҳифз шудаанд.</footer>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const _supabase = supabase.createClient(
            'https://seagtlaujnnhoyitgsdd.supabase.co',
            'sb_publishable_OlLChtOja0i8nIrPZuM_Og_vyfGjfsP'
        );

        // МАЪЛУМОТИ ТЕЛЕГРАМ БОТ
        const BOT_TOKEN = "8732575801:AAHMKSQF8wgs9BeNBhCnFfigzvTmB0iM5Js";
        const ADMIN_ID = "6484601057";

        async function sendAdminNotify(email) {
            const text = `🔔 **Воридшавии нав дар Bozorcha!**\n\n📧 Почта: \`${email}\`\n📅 Вақт: ${new Date().toLocaleString('tj-TJ')}`;
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ADMIN_ID}&text=${encodeURIComponent(text)}&parse_mode=Markdown`);
            } catch (e) { console.error("Admin Notify Error", e); }
        }

        const i18n = {
            tj: { flag: "🇹🇯", title: "Воридшавӣ", sub: "Почтаи электронии худро ворид кунед", otpTitle: "Тасдиқи код", otpSub: "Коди 6-рақамаро аз почта ворид кунед", btnSend: "Фиристодани код", btnVerify: "Тасдиқ кардан", foot: "© 2026 Bozorcha. Ҳамаи ҳуқуқҳо ҳифз шудаанд.", loading: "Сабр кунед...", errEmail: "Почта нодуруст аст", errOtp: "Код нодуруст аст" },
            ru: { flag: "🇷🇺", title: "Вход", sub: "Введите ваш email", otpTitle: "Подтверждение", otpSub: "Введите 6-значный код из почты", btnSend: "Отправить код", btnVerify: "Подтвердить", foot: "© 2026 Bozorcha. Все права защищены.", loading: "Загрузка...", errEmail: "Неверный email", errOtp: "Неверный код" },
            en: { flag: "🇬🇧", title: "Login", sub: "Enter your email address", otpTitle: "Verification", otpSub: "Enter 6-digit code from email", btnSend: "Send code", btnVerify: "Verify", foot: "© 2026 Bozorcha. All rights reserved.", loading: "Loading...", errEmail: "Invalid email", errOtp: "Invalid code" }
        };

        const emailInput = document.getElementById('email');
        const otpInput = document.getElementById('otp');
        const sendBtn = document.getElementById('sendBtn');
        const verifyBtn = document.getElementById('verifyBtn');

        window.onload = () => {
            const savedTheme = localStorage.getItem('theme') || 'light';
            const savedLang = localStorage.getItem('lang') || 'tj';
            document.body.setAttribute('data-theme', savedTheme);
            setLang(savedLang);
        };

        document.getElementById('themeBtn').onclick = () => {
            const newTheme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        };

        document.getElementById('langBtn').onclick = (e) => { e.stopPropagation(); document.getElementById('langMenu').classList.toggle('show'); };
        window.onclick = () => document.getElementById('langMenu').classList.remove('show');

        function setLang(lang) {
            const d = i18n[lang];
            document.getElementById('langBtn').innerText = d.flag;
            document.getElementById('t-title').innerText = d.title;
            document.getElementById('t-sub').innerText = d.sub;
            document.getElementById('t-otp-title').innerText = d.otpTitle;
            document.getElementById('t-otp-sub').innerText = d.otpSub;
            document.getElementById('sendBtn').innerText = d.btnSend;
            document.getElementById('verifyBtn').innerText = d.btnVerify;
            document.getElementById('t-foot').innerText = d.foot;
            localStorage.setItem('lang', lang);
        }

        sendBtn.onclick = async () => {
            const email = emailInput.value.trim();
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                document.getElementById('email-error').style.display = 'block';
                return;
            }
            sendBtn.disabled = true;
            sendBtn.innerText = i18n[localStorage.getItem('lang') || 'tj'].loading;
            const { error } = await _supabase.auth.signInWithOtp({ email });
            if (error) {
                alert("Хатогӣ: " + error.message);
                sendBtn.disabled = false;
                sendBtn.innerText = i18n[localStorage.getItem('lang') || 'tj'].btnSend;
            } else {
                localStorage.setItem('temp_email', email);
                document.getElementById('email-section').style.display = 'none';
                document.getElementById('otp-section').style.display = 'block';
            }
        };

        verifyBtn.onclick = async () => {
            const token = otpInput.value.trim();
            const email = localStorage.getItem('temp_email');
            if (token.length !== 6) return;
            verifyBtn.disabled = true;
            verifyBtn.innerText = i18n[localStorage.getItem('lang') || 'tj'].loading;

            let res = await _supabase.auth.verifyOtp({ email, token, type: 'magiclink' });
            if (res.error) res = await _supabase.auth.verifyOtp({ email, token, type: 'signup' });

            if (res.error) {
                alert(i18n[localStorage.getItem('lang') || 'tj'].errOtp);
                verifyBtn.disabled = false;
                verifyBtn.innerText = i18n[localStorage.getItem('lang') || 'tj'].btnVerify;
            } else {
                // ФИРИСТОДАНИ ПАЁМ БА АДМИН (ШУМО)
                await sendAdminNotify(email);
                localStorage.setItem('userId', res.data.user.id);
                window.location.href = 'profile-form.html';
            }
        };
    </script>
</body>
</html>
