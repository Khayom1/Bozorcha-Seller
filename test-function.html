<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Санҷиши Edge Function</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 500px; margin: 0 auto; line-height: 1.6; }
        button { padding: 12px 24px; background: #ff9800; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        button:hover { background: #e68a00; }
        #result { margin-top: 20px; padding: 15px; border: 1px solid #ccc; min-height: 50px; border-radius: 5px; word-wrap: break-word; }
    </style>
</head>
<body>
    <h1>Санҷиши Edge Function</h1>
    <p>Ин функсия ба Telegram паём мефиристад.</p>
    
    <button onclick="sendTest()">Фиристодани паёми санҷишӣ</button>
    
    <div id="result">Натиҷа дар ин ҷо намоиш дода мешавад...</div>

    <script>
        async function sendTest() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Фиристода истодааст...';
            resultDiv.style.color = 'blue';
            
            try {
                const functionUrl = 'https://seagtlajnnhoitytsgd.supabase.co/functions/v1/telegram-notify';
                const message = '🔔 **Санҷиш**\n\nИн паём аз Edge Function фиристода шуд!';
                
                const response = await fetch(functionUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        // Агар функсияи шумо калидро талаб кунад, дар ин ҷо илова кунед:
                        // 'Authorization': 'Bearer ВАЙ_КАЛИДИ_ШУМО'
                    },
                    body: JSON.stringify({ text: message })
                });
                
                if (!response.ok) {
                    throw new Error(`Хатогии сервер: ${response.status}`);
                }

                const data = await response.json();
                resultDiv.innerHTML = '✅ Муваффақият!';
                resultDiv.style.color = 'green';
                
            } catch (error) {
                resultDiv.innerHTML = '❌ Хатогӣ: ' + error.message + '<br><small>Эзоҳ: Боварӣ ҳосил кунед, ки дар Edge Function танзимоти CORS иҷозат дода шудааст.</small>';
                resultDiv.style.color = 'red';
            }
        }
    </script>
</body>
</html>
