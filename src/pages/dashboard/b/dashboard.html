<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bozorcha</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #f4f4f4;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Content area - ин ҷо саҳифаҳо бор мешаванд */
        .content-area {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 70px; /* Барои bottom navigation */
        }
        
        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 8px 0 16px;
            box-shadow: 0 -2px 8px rgba(0,0,0,0.05);
            z-index: 1000;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: #999;
            cursor: pointer;
            transition: color 0.3s;
        }
        
        .nav-item.active {
            color: #E02E24;
        }
        
        .nav-icon {
            width: 24px;
            height: 24px;
        }
    </style>
</head>
<body>
    <!-- Content area -->
    <div class="content-area" id="contentArea">
        <!-- Саҳифаҳо (home, chat, cart, profile) бо JavaScript бор мешаванд -->
    </div>
    
    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <div class="nav-item active" onclick="loadPage('home')">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 3L4 9v12h16V9l-8-6z"/>
            </svg>
            <span>Асосӣ</span>
        </div>
        <div class="nav-item" onclick="loadPage('chat')">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
            </svg>
            <span>Паём</span>
        </div>
        <div class="nav-item" onclick="loadPage('cart')">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/>
            </svg>
            <span>Сабад</span>
        </div>
        <div class="nav-item" onclick="loadPage('profile')">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
            </svg>
            <span>Профил</span>
        </div>
    </nav>

    <script type="module">
        import { supabase } from '/src/js/supabase.js'
        import { checkAuth, saveReturnUrl } from '/src/js/guard.js'
        
        // Бор кардани саҳифаи пешфарз (home)
        window.addEventListener('DOMContentLoaded', () => {
            loadPage('home')
        })
        
        // Функсия барои бор кардани саҳифаҳо
        window.loadPage = async (page) => {
            const contentArea = document.getElementById('contentArea')
            
            // Навсозии active class
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'))
            event?.currentTarget?.classList.add('active')
            
            // Санҷидани воридшавӣ барои саҳифаҳои маҳдуд
            const protectedPages = ['chat', 'cart', 'profile']
            
            if (protectedPages.includes(page)) {
                const { data: { user } } = await supabase.auth.getUser()
                
                if (!user) {
                    saveReturnUrl(window.location.href)
                    window.location.href = '/src/pages/auth/b/method.html'
                    return
                }
            }
            
            try {
                const response = await fetch(`/src/pages/b/${page}/${page}.html`)
                const html = await response.text()
                contentArea.innerHTML = html
            } catch (error) {
                console.error('Error loading page:', error)
                contentArea.innerHTML = '<div style="text-align: center; padding: 40px;">Саҳифа бор нашуд</div>'
            }
        }
    </script>
</body>
</html>
