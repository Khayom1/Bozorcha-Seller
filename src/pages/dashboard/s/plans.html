<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Планҳои тарифӣ - Bozorcha</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="../../../styles/main.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #fff;
            line-height: 1.5;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 30px;
            text-align: center;
        }

        .gradient-text {
            background: linear-gradient(135deg, #ff9500, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .plans-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .plan-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px 20px;
            transition: all 0.3s;
            position: relative;
        }

        .plan-card:hover {
            transform: translateY(-5px);
            border-color: #ff9500;
            box-shadow: 0 10px 30px rgba(255,149,0,0.2);
        }

        .plan-card.current-plan {
            border: 2px solid #ff9500;
            box-shadow: 0 0 30px rgba(255,149,0,0.3);
        }

        .plan-card h3 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 15px;
            text-align: center;
        }

        .plan-price {
            font-size: 28px;
            font-weight: 800;
            color: #ff9500;
            text-align: center;
            margin-bottom: 20px;
        }

        .plan-features {
            list-style: none;
            margin-bottom: 25px;
        }

        .plan-features li {
            padding: 8px 0;
            color: #94a3b8;
            font-size: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .select-plan-btn, .current-btn {
            width: 100%;
            padding: 12px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
        }

        .select-plan-btn {
            background: #ff9500;
            color: white;
        }

        .select-plan-btn:hover {
            background: #e08600;
            transform: scale(1.02);
        }

        .current-btn {
            background: transparent;
            border: 2px solid #ff9500;
            color: #ff9500;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #94a3b8;
        }

        .user-info {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .current-plan-badge {
            background: #ff9500;
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
        }

        .cancel-btn {
            background: transparent;
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .cancel-btn:hover {
            background: #ef4444;
            color: white;
        }

        @media (max-width: 1024px) {
            .plans-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 640px) {
            .plans-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Планҳои <span class="gradient-text">тарифӣ</span></h1>

        <div id="userInfo" class="user-info" style="display: none;">
            <div>
                <span id="userEmail"></span>
            </div>
            <div>
                <span id="currentPlanBadge" class="current-plan-badge"></span>
                <button id="cancelBtn" class="cancel-btn" style="display: none;">Қатъ кардани обуна</button>
            </div>
        </div>

        <div id="plansContainer">
            <div class="loading">Дар ҳоли боркунӣ...</div>
        </div>
    </div>

    <script type="module">
        import { supabase } from '../../../js/supabase.js'
        import planManager from '../../../js/plans.js'

        document.addEventListener('DOMContentLoaded', async () => {
            // Санҷиши воридшавӣ
            const { data: { user } } = await supabase.auth.getUser()
            
            if (user) {
                document.getElementById('userInfo').style.display = 'flex'
                document.getElementById('userEmail').textContent = user.email
            }

            // Инициализатсияи planManager
            await planManager.init()

            // Нишон додани планҳо
            planManager.renderPlans('plansContainer', async (planId) => {
                const confirmed = confirm('Оё шумо боварӣ доред, ки ин планро интихоб кардан мехоҳед?')
                if (confirmed) {
                    const success = await planManager.subscribe(planId)
                    if (success) {
                        alert('Обуна бомуваффақият фаъол карда шуд!')
                        
                        // Аз нав бор кардани саҳифа
                        location.reload()
                    }
                }
            })

            // Нишон додани обунаи ҷорӣ
            if (planManager.currentPlan) {
                const plan = planManager.getPlanById(planManager.currentPlan.plan_id)
                if (plan) {
                    document.getElementById('currentPlanBadge').textContent = 
                        `Обунаи фаъол: ${plan.name === 'start' ? 'Start' : 
                                          plan.name === 'plus' ? 'Plus' : 
                                          plan.name === 'pro' ? 'Pro' : 'Premium'}`
                    document.getElementById('cancelBtn').style.display = 'inline-block'
                }
            }

            // Қатъ кардани обуна
            document.getElementById('cancelBtn').addEventListener('click', async () => {
                const confirmed = confirm('Оё шумо боварӣ доред, ки обунаро қатъ кардан мехоҳед?')
                if (confirmed) {
                    const success = await planManager.cancelSubscription()
                    if (success) {
                        alert('Обуна қатъ карда шуд')
                        location.reload()
                    }
                }
            })
        })
    </script>
</body>
</html>
