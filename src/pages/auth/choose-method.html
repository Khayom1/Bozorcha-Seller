<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <title>Bozorcha — Интихоби Усул</title>
</head>
<body>
    <h1 id="title">Интихоби усул</h1>
    <p id="description">Лутфан усули дилхоҳро интихоб кунед:</p>

    <button id="btn-phone" style="padding: 20px; margin: 10px; cursor: pointer;">
        📱 Тавассути Телефон
    </button>

    <button id="btn-email" style="padding: 20px; margin: 10px; cursor: pointer;">
        📧 Тавассути Почта (Email)
    </button>

    <br>
    <button onclick="history.back()">← Бозгашт</button>

    <script>
        // 1. Гирифтани "Сигнал" аз URL (login ё register)
        const urlParams = new URLSearchParams(window.location.search);
        const action = urlParams.get('action'); // 'login' ё 'register'
        const role = localStorage.getItem('user_role'); // 'seller' ё 'buyer'

        // 2. Тағйир додани матни саҳифа вобаста ба мақсад
        if (action === 'register') {
            document.getElementById('title').innerText = "Сабти номи нав";
        } else {
            document.getElementById('title').innerText = "Воридшавӣ";
        }

        // 3. Мантиқи тугмаҳо
        document.getElementById('btn-phone').addEventListener('click', () => {
            if (action === 'register') {
                window.location.href = 'src/pages/aurh/register-phone.html';
            } else {
                window.location.href = 'src/pages/aurh/login-phone.html';
            }
        });

        document.getElementById('btn-email').addEventListener('click', () => {
            if (action === 'register') {
                window.location.href = 'src/pages/aurh/register-email.html';
            } else {
                window.location.href = 'src/pages/aurh/login-email.html';
            }
        });
    </script>
</body>
</html>
