<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <title>Сабти ном — Bozorcha</title>
</head>
<body>
    <div id="app" style="display: none;">
        <h2 id="txt-title"></h2>
        <button onclick="goTo('register/phone.html')" id="btn-phone"></button>
        <button onclick="goTo('register/email.html')" id="btn-email"></button>
        <button onclick="history.back()" id="btn-back"></button>
    </div>

    <script type="module">
        import { t, initI18n } from '../../../../src/js/i18n.js';

        async function init() {
            const steps = JSON.parse(sessionStorage.getItem('steps_taken') || '[]');
            if (!steps.includes('method.html')) { window.location.href = 'method.html'; return; }

            await initI18n();
            document.getElementById('txt-title').innerText = t('auth.reg_start_title');
            document.getElementById('btn-phone').innerText = t('auth.reg_with_phone');
            document.getElementById('btn-email').innerText = t('auth.reg_with_email');
            document.getElementById('btn-back').innerText = t('auth.back');
            document.getElementById('app').style.display = 'block';
        }

        window.goTo = (path) => {
            const steps = JSON.parse(sessionStorage.getItem('steps_taken'));
            steps.push('register.html');
            sessionStorage.setItem('steps_taken', JSON.stringify(steps));
            window.location.href = path;
        };
        init();
    </script>
</body>
</html>
