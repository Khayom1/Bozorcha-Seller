<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сабти ном барои фурӯшандагон - Bozorcha</title>
    <link rel="stylesheet" href="/src/styles/main.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
        }
        
        .auth-card {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .auth-header .role-badge {
            background: #28a745;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            display: inline-block;
            margin-bottom: 15px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        @media (max-width: 480px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #28a745;
        }
        
        .auth-btn {
            width: 100%;
            padding: 14px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .auth-btn:hover {
            background: #218838;
        }
        
        .auth-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .auth-links {
            text-align: center;
            margin-top: 20px;
        }
        
        .auth-links a {
            color: #28a745;
            text-decoration: none;
        }
        
        .auth-links a:hover {
            text-decoration: underline;
        }
        
        .error-message {
            background: #fee;
            color: #c33;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .back-btn {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .back-btn:hover {
            color: #333;
        }
        
        /* Тёмная тема */
        .theme-dark .auth-card {
            background: #2d2d2d;
        }
        
        .theme-dark .form-group label {
            color: #ddd;
        }
        
        .theme-dark .form-group input {
            background: #3d3d3d;
            border-color: #4d4d4d;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <button class="back-btn" onclick="window.location.href='/src/pages/dashboard/s/dashboard.html'">← Ба дашборд</button>
            
            <div class="auth-header">
                <span class="role-badge">Фурӯшанда</span>
                <h2>Сабти ном барои фурӯшандагон</h2>
                <p>Барои оғози тиҷорати онлайн</p>
            </div>
            
            <div id="errorMessage" class="error-message"></div>
            
            <form id="registerForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Ном</label>
                        <input type="text" id="firstName" placeholder="Алӣ" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Насаб</label>
                        <input type="text" id="lastName" placeholder="Алиев" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Номи мағоза</label>
                    <input type="text" id="shopName" placeholder="Мағозаи Алӣ" required>
                </div>
                
                <div class="form-group">
                    <label>Почтаи электронӣ</label>
                    <input type="email" id="email" placeholder="ali@example.com" required>
                </div>
                
                <div class="form-group">
                    <label>Рақами телефон</label>
                    <input type="tel" id="phone" placeholder="+992 900 000 000" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Парол</label>
                        <input type="password" id="password" placeholder="********" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Такрори парол</label>
                        <input type="password" id="confirmPassword" placeholder="********" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="terms" required>
                        Қоидаҳои истифодаро қабул мекунам
                    </label>
                </div>
                
                <button type="submit" class="auth-btn" id="submitBtn">Сабти ном</button>
            </form>
            
            <div class="auth-links">
                Аллакай ҳисоб доред? <a href="#" onclick="goToLogin()">Ворид шавед</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from '/src/js/supabase.js'
        import { isValidEmail, isValidPhone, isValidPassword } from '/src/js/utils.js'
        
        window.goToLogin = () => {
            window.location.href = '/src/pages/auth/s/login/email.html'
        }
        
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault()
            
            const email = document.getElementById('email').value
            const password = document.getElementById('password').value
            const confirmPassword = document.getElementById('confirmPassword').value
            const firstName = document.getElementById('firstName').value
            const lastName = document.getElementById('lastName').value
            const shopName = document.getElementById('shopName').value
            const phone = document.getElementById('phone').value
            const terms = document.getElementById('terms').checked
            
            const errorDiv = document.getElementById('errorMessage')
            errorDiv.style.display = 'none'
            
            // Валидация
            if (!isValidEmail(email)) {
                errorDiv.textContent = 'Почтаи электронӣ нодуруст аст'
                errorDiv.style.display = 'block'
                return
            }
            
            if (!isValidPhone(phone)) {
                errorDiv.textContent = 'Рақами телефон нодуруст аст'
                errorDiv.style.display = 'block'
                return
            }
            
            if (!isValidPassword(password)) {
                errorDiv.textContent = 'Парол бояд ҳадди ақал 8 символ бошад'
                errorDiv.style.display = 'block'
                return
            }
            
            if (password !== confirmPassword) {
                errorDiv.textContent = 'Паролҳо мувофиқат намекунанд'
                errorDiv.style.display = 'block'
                return
            }
            
            if (!terms) {
                errorDiv.textContent = 'Шумо бояд қоидаҳоро қабул кунед'
                errorDiv.style.display = 'block'
                return
            }
            
            const submitBtn = document.getElementById('submitBtn')
            submitBtn.disabled = true
            submitBtn.textContent = 'Сабти ном...'
            
            try {
                // 1. Сабти ном дар Supabase Auth
                const { data: authData, error: authError } = await supabase.auth.signUp({
                    email,
                    password,
                    options: {
                        data: {
                            first_name: firstName,
                            last_name: lastName,
                            role: 'seller'
                        }
                    }
                })
                
                if (authError) throw authError
                
                // 2. Эҷоди профил
                const { error: profileError } = await supabase
                    .from('profiles')
                    .insert([
                        {
                            id: authData.user.id,
                            first_name: firstName,
                            last_name: lastName,
                            email: email,
                            phone: phone,
                            roles: ['seller']
                        }
                    ])
                
                if (profileError) throw profileError
                
                // 3. Эҷоди мағоза
                const { error: shopError } = await supabase
                    .from('shops')
                    .insert([
                        {
                            user_id: authData.user.id,
                            name: shopName,
                            slug: shopName.toLowerCase().replace(/\s+/g, '_'),
                            phone: phone
                        }
                    ])
                
                if (shopError) throw shopError
                
                // Муваффақият
                errorDiv.style.backgroundColor = '#d4edda'
                errorDiv.style.color = '#155724'
                errorDiv.textContent = 'Сабти ном муваффақ шуд! Барои фаъолсозӣ, почтаи худро тафтиш кунед.'
                errorDiv.style.display = 'block'
                
                setTimeout(() => {
                    window.location.href = '/src/pages/auth/s/login/email.html'
                }, 3000)
                
            } catch (error) {
                errorDiv.textContent = error.message
                errorDiv.style.display = 'block'
                submitBtn.disabled = false
                submitBtn.textContent = 'Сабти ном'
            }
        })
    </script>
</body>
</html>
