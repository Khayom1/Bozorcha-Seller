<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интихоби усул - Bozorcha</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        h1 { margin-bottom: 30px; color: #ff9500; }
        .btn {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            background: #ff9500;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #ff9500;
            color: #ff9500;
        }
        .back-btn {
            margin-top: 20px;
            display: inline-block;
            color: #94a3b8;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Хуш омадед ба Bozorcha</h1>
        <p style="margin-bottom: 20px; color: #94a3b8;">Барои фурӯшандагон</p>
        
        <button class="btn" onclick="goTo('login')">Ворид шудан</button>
        <button class="btn btn-outline" onclick="goTo('register')">Сабти ном</button>
        
        <a href="/index.html" class="back-btn">← Бозгашт</a>
    </div>

    <script>
        function goTo(type) {
            if (type === 'login') {
                window.location.href = 'login/phone.html'
            } else {
                window.location.href = 'register/phone.html'
            }
        }
    </script>
</body>
</html>
