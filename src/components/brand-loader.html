<!-- Premium Brand Loader — Drop your SVG into the placeholder below -->
<div class="logo-loader" aria-hidden="true">
  <!-- Replace the SVG below with your original inline SVG markup.
       Do not change path coordinates. The script will target shapes automatically.
  -->
  <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Brand logo">
    <!-- ИН ҶО ЛОГОТИПИ АСЛИИ ХУДРО ГУЗОРЕД -->
    <!-- Мисол (бо логотипи Bozorcha): -->
    <g class="pulse" transform="translate(0,0)">
      <!-- Хатҳои берунӣ (бо stroke) -->
      <path d="M40 100 C60 30, 140 30, 160 100 C140 170, 60 170, 40 100 Z"
            class="draw" data-anim-shape fill="none" stroke="#FF9F43" stroke-width="2"/>
      <!-- Қисми дарунӣ (бо fill) -->
      <path d="M60 100 C75 60, 125 60, 140 100 C125 140, 75 140, 60 100 Z"
            class="fill-anim" data-anim-fill fill="#FF9F43" stroke="none"/>
    </g>
  </svg>

  <!-- Sweep overlay: a soft white-to-transparent gradient masked to the logo shape -->
  <svg class="sweep" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <defs>
      <linearGradient id="sweepGrad" x1="0" x2="1">
        <stop offset="0%" stop-color="rgba(255,255,255,0)" />
        <stop offset="45%" stop-color="rgba(255,255,255,0.35)" />
        <stop offset="55%" stop-color="rgba(255,255,255,0.6)" />
        <stop offset="100%" stop-color="rgba(255,255,255,0)" />
      </linearGradient>
      <mask id="logoMask">
        <!-- The mask content will be replaced by JS with the actual logo shapes -->
        <rect width="100%" height="100%" fill="black" />
      </mask>
    </defs>

    <!-- A rectangle filled with the gradient, masked to the logo -->
    <rect width="100%" height="100%" fill="url(#sweepGrad)" mask="url(#logoMask)"></rect>
  </svg>
</div>

<style>
  :root{
    --loop: 5s;                 /* total loop length (4–6s recommended) */
    --easing: cubic-bezier(.22,.9,.32,1); /* premium easing */
    --brand: #FF9F43;          /* replace with your brand color */
    --accent: rgba(255,255,255,0.6);
    --bg: #0f1720;
    --pulse-scale: 1.03;
    --glow: 18px;
  }

  /* Page centering */
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--bg);
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
  }

  /* Loader container */
  .logo-loader{
    width: 160px;
    height: 160px;
    display:inline-block;
    position:relative;
    will-change:transform, filter;
  }

  /* Ensure SVG scales nicely */
  .logo-loader svg{
    width:100%;
    height:100%;
    display:block;
  }

  /* Phase timing breakdown (percentages map to keyframes below) */
  /* Stroke draw: 0% → 28% (1.4s)
     Fill: 28% → 48% (1.0s)
     Pulse: 48% → 78% (1.5s)
     Highlight sweep: 58% → 88% (1.5s) overlapping pulse
     Reset: 88% → 100% (0.6s)
  */

  /* Default styles for all vector shapes inside the SVG */
  .logo-loader svg [data-anim-shape]{
    stroke: var(--brand);
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: transparent;
    vector-effect: non-scaling-stroke;
    transition: fill 0.9s var(--easing), stroke 0.6s var(--easing);
  }

  /* Fill target (we fade fill-opacity in Phase 2) */
  .logo-loader svg [data-anim-fill]{
    fill: var(--brand);
    fill-opacity: 0;
    transition: fill-opacity 0.9s var(--easing);
  }

  /* Stroke draw animation (uses dashoffset) */
  .logo-loader .draw{
    stroke-dasharray: 1; /* will be set by JS to exact length */
    stroke-dashoffset: 1;
    animation: stroke-draw var(--loop) linear infinite;
    animation-timing-function: linear;
  }

  @keyframes stroke-draw{
    0%   { stroke-dashoffset: 1; opacity:1; }
    28%  { stroke-dashoffset: 0; opacity:1; } /* drawn */
    88%  { stroke-dashoffset: 0; opacity:1; } /* remain drawn */
    100% { stroke-dashoffset: 1; opacity:0; } /* reset invisibly */
  }

  /* Fill in Phase 2 */
  .logo-loader .fill-anim{
    animation: fill-phase var(--loop) var(--easing) infinite;
  }
  @keyframes fill-phase{
    0%   { fill-opacity: 0; }
    28%  { fill-opacity: 0; }
    36%  { fill-opacity: 0.6; } /* soft partial fill */
    48%  { fill-opacity: 1; }   /* full brand fill */
    88%  { fill-opacity: 1; }
    100% { fill-opacity: 0; }   /* reset */
  }

  /* Subtle activity pulse (scale + glow) */
  .logo-loader .pulse{
    animation: pulse-phase var(--loop) var(--easing) infinite;
    transform-origin: 50% 50%;
    will-change: transform, filter;
  }
  @keyframes pulse-phase{
    0%   { transform: scale(1); filter: drop-shadow(0 0 0 rgba(0,0,0,0)); }
    48%  { transform: scale(1); filter: drop-shadow(0 0 0 rgba(0,0,0,0)); }
    58%  { transform: scale(var(--pulse-scale)); filter: drop-shadow(0 8px var(--glow) rgba(255,159,67,0.08)); }
    78%  { transform: scale(1); filter: drop-shadow(0 0 0 rgba(0,0,0,0)); }
    100% { transform: scale(1); filter: drop-shadow(0 0 0 rgba(0,0,0,0)); }
  }

  /* Highlight sweep overlay using an absolutely positioned SVG mask */
  .logo-loader .sweep{
    position:absolute;
    inset:0;
    pointer-events:none;
    mix-blend-mode:screen;
    opacity:0.0;
    animation: sweep-phase var(--loop) var(--easing) infinite;
  }
  @keyframes sweep-phase{
    0%   { opacity:0; transform: translateX(-30%); }
    56%  { opacity:0; transform: translateX(-30%); }
    60%  { opacity:1; transform: translateX(-10%); }
    72%  { opacity:1; transform: translateX(40%); }
    88%  { opacity:0; transform: translateX(80%); }
    100% { opacity:0; transform: translateX(100%); }
  }

  /* Reduced motion preference */
  @media (prefers-reduced-motion: reduce){
    .logo-loader * { animation: none !important; transition: none !important; }
  }
</style>

<script>
/* Minimal JS initializer
   - Measures path lengths and sets stroke-dasharray/dashoffset for perfect draw
   - Copies the logo shapes into the sweep mask so the highlight follows exact geometry
   - Adds data attributes if missing so CSS targets shapes consistently
*/
(function initLogoLoader(){
  const loader = document.querySelector('.logo-loader');
  if(!loader) return;

  const svg = loader.querySelector('svg');
  const sweepSvg = loader.querySelector('.sweep');
  const mask = sweepSvg && sweepSvg.querySelector('#logoMask');

  // Collect all vector shapes to animate
  const selectors = 'path, circle, rect, line, polyline, polygon';
  const shapes = Array.from(svg.querySelectorAll(selectors));

  // If no shapes found, nothing to do
  if(shapes.length === 0) return;

  // Ensure each shape has the expected data attributes and classes
  shapes.forEach((el, i) => {
    if(!el.hasAttribute('data-anim-shape')) el.setAttribute('data-anim-shape', 'true');
    // Add draw class to outlines (if stroke present)
    const stroke = window.getComputedStyle(el).stroke;
    if((stroke && stroke !== 'none') || el.getAttribute('stroke')){
      el.classList.add('draw');
    }
    // Add fill-anim class to filled shapes
    const fill = window.getComputedStyle(el).fill;
    if((fill && fill !== 'none' && fill !== 'rgb(0, 0, 0)') || el.getAttribute('fill')){
      el.classList.add('fill-anim');
    }
  });

  // Set stroke-dasharray/dashoffset precisely for each stroked element
  shapes.forEach(el => {
    try{
      if(typeof el.getTotalLength === 'function'){
        const len = el.getTotalLength();
        // Use normalized values so CSS keyframes can animate from 1 -> 0
        el.style.strokeDasharray = len;
        el.style.strokeDashoffset = len;
        // Also set a CSS custom property with normalized length for potential debugging
        el.style.setProperty('--path-length', len);
      }
    }catch(e){
      // Some shapes (like rect) may not support getTotalLength in all browsers; ignore safely
    }
  });

  // Build mask content for the sweep overlay by cloning the logo shapes
  if(mask){
    // Clear mask
    while(mask.firstChild) mask.removeChild(mask.firstChild);
    // Clone shapes into mask as white shapes (white = visible in mask)
    shapes.forEach(s => {
      const clone = s.cloneNode(true);
      // Remove animations and classes from mask clone
      clone.removeAttribute('class');
      clone.removeAttribute('style');
      // Ensure mask shapes are filled white
      clone.setAttribute('fill', 'white');
      clone.setAttribute('stroke', 'white');
      mask.appendChild(clone);
    });
  }

  // Accessibility: hide from assistive tech while loading
  loader.setAttribute('aria-hidden', 'true');

})();
</script>
