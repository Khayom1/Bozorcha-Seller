<!DOCTYPE html>
<html lang="tg">
<head>
<meta charset="UTF-8">
<title>Bozorcha Premium Animation</title>

<style>
    body {
        margin: 0;
        background: #0b1a2f;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
    }

    /* Контейнери асосӣ */
    .logoBox {
        width: 180px; /* Андоза барои маркетплейс мувофиқ карда шуд */
        opacity: 0;
        animation: appear 0.6s ease forwards;
        filter: drop-shadow(0 0 0px rgba(255, 138, 61, 0));
    }

    /* Эффекти дурахш ва нафаскашӣ дар охир */
    .logoBox.finished {
        animation: 
            premiumGlow 1.5s ease-in-out forwards,
            premiumBounce 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    #logo path {
        stroke: #ff8a3d;
        stroke-width: 1.5;
        fill: transparent;
        stroke-dasharray: 2500;
        stroke-dashoffset: 2500;
        stroke-linecap: round;
        stroke-linejoin: round;
        
        /* Аниматсияи кашидани хатҳо - Тез дар аввал, суст дар охир */
        animation: 
            draw 2.2s cubic-bezier(0.65, 0, 0.35, 1) forwards,
            fillColor 0.8s ease-in-out forwards 1.8s;
    }

    /* СИРРИ PREMIUM: Пайдарпайии хатҳо (Stagger) */
    /* Ин ҷо мо ба ҳар як қисми логотип таъхир медиҳем */
    #logo path:nth-child(odd) { animation-delay: 0.1s, 1.9s; }
    #logo path:nth-child(even) { animation-delay: 0.3s, 2.1s; }
    #logo path:nth-child(3n) { animation-delay: 0.5s, 2.3s; }

    @keyframes draw {
        to { stroke-dashoffset: 0; }
    }

    @keyframes fillColor {
        0% { fill: transparent; }
        100% { fill: #ff8a3d; stroke: transparent; }
    }

    @keyframes appear {
        to { opacity: 1; }
    }

    @keyframes premiumGlow {
        to { filter: drop-shadow(0 0 15px rgba(255, 138, 61, 0.6)); }
    }

    @keyframes premiumBounce {
        0% { transform: scale(1); }
        50% { transform: scale(1.08); }
        100% { transform: scale(1); }
    }
</style>
</head>
