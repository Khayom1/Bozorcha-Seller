<!DOCTYPE html>
<html lang="tg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

<style>
body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:radial-gradient(circle at 50% 40%,#1a1a1a,#000);
overflow:hidden;
}

.scene{
perspective:1200px;
position:relative;
}

.logo{
width:420px;
transform-style:preserve-3d;
}

.energy path{
fill:none;
stroke:#ffffff;
stroke-width:3;
stroke-linecap:round;
stroke-dasharray:2500;
stroke-dashoffset:2500;
}

#cap{
opacity:0;
fill:url(#capGrad);
}

#symbol{
opacity:0;
fill:#000000;
}

#wave{
opacity:0;
fill:url(#waveGrad);
}

.light{
position:absolute;
top:0;
left:-120%;
width:60%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,.25),transparent);
transform:skewX(-20deg);
}
</style>
</head>

<body>

<div class="scene">

<div class="light"></div>

<svg class="logo" viewBox="0 0 533 600">

<defs>

<linearGradient id="capGrad" x1="0%" y1="0%" x2="0%" y2="100%">
<stop offset="0%" stop-color="#F6C27C"/>
<stop offset="100%" stop-color="#F3B66E"/>
</linearGradient>

<linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#FFA33A"/>
<stop offset="50%" stop-color="#FF7A1A"/>
<stop offset="100%" stop-color="#FF3B00"/>
</linearGradient>

</defs>

<!-- snake lines -->

<g class="energy">
<path id="line1" d="M80 120 L460 120"/>
<path id="line2" d="M220 260 L220 440"/>
<path id="line3" d="M320 360 C380 400 440 460 470 520"/>
</g>

<!-- cap -->
<g id="cap">
<path d="M80 120 C120 80 420 80 460 120 L460 170 L80 170 Z"/>
</g>

<!-- symbol -->
<g id="symbol">
<path d="M210 260 L210 430 L290 430 L290 260 Z"/>
</g>

<!-- wave -->
<g id="wave">
<path d="M320 360 C400 400 450 460 480 520 C420 520 360 470 320 420 Z"/>
</g>

</svg>

</div>

<script>

const tl = gsap.timeline()

// snake draw
tl.to("#line1",{strokeDashoffset:0,duration:1.2,ease:"power3.out"})
.to("#line2",{strokeDashoffset:0,duration:1,ease:"power3.out"},"-=0.8")
.to("#line3",{strokeDashoffset:0,duration:1,ease:"power3.out"},"-=0.8")

// fill
.to("#cap",{opacity:1,duration:.6})
.to("#symbol",{opacity:1,duration:.6})
.to("#wave",{opacity:1,duration:.6})

// 3D cinematic
.to(".logo",{
rotateX:12,
rotateY:-10,
scale:1.05,
duration:1,
ease:"power2.out"
})

// light sweep
.to(".light",{
left:"120%",
duration:1
},"-=0.6")

</script>

</body>
</html>
