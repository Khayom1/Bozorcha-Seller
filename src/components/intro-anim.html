<!DOCTYPE html>
<html lang="tg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bozorcha - Cinematic SVG Animation</title>

<style>
    body {
        margin: 0;
        background: radial-gradient(circle at 50% 50%, #1a1005 0%, #050505 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
    }

    /* Зарраҳои тиллоии боҳашамат */
    #particles-container {
        position: absolute;
        width: 100%;
        height: 100%;
        z-index: 1;
    }

    .particle {
        position: absolute;
        background: #ff8a3d;
        border-radius: 50%;
        opacity: 0;
        animation: floatUp infinite linear;
    }

    @keyframes floatUp {
        0% { transform: translateY(0) scale(0.5); opacity: 0; }
        50% { opacity: 0.6; }
        100% { transform: translateY(-300px) scale(1.2); opacity: 0; }
    }

    /* Контейнери асосии логотип */
    .logo-container {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    /* Эффекти Тулӯи Офтоб (Sunrise Reveal) */
    .bozorcha-svg {
        width: 280px; /* Андозаи калони синамоӣ */
        height: auto;
        opacity: 0;
        transform: translateY(50px) scale(0.9);
        filter: drop-shadow(0 0 0px rgba(255, 138, 61, 0));
        
        /* Аниматсияҳо: 1. Пайдоиш, 2. Нафаскашӣ, 3. Шинокунӣ */
        animation: 
            sunrise 2.5s cubic-bezier(0.2, 0.5, 0.2, 1) forwards,
            breathe 5s ease-in-out infinite 2.5s,
            float 7s ease-in-out infinite 2.5s;
    }

    @keyframes sunrise {
        0% { opacity: 0; transform: translateY(50px) scale(0.9); filter: blur(10px); }
        100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0px) drop-shadow(0 15px 40px rgba(255, 138, 61, 0.5)); }
    }

    @keyframes breathe {
        0%, 100% { transform: scale(1); filter: drop-shadow(0 15px 40px rgba(255, 138, 61, 0.5)); }
        50% { transform: scale(1.05); filter: drop-shadow(0 25px 70px rgba(255, 138, 61, 0.8)); }
    }

    @keyframes float {
        0%, 100% { margin-top: 0px; }
        50% { margin-top: -20px; }
    }

    /* Нури паси логотип */
    .glow-effect {
        position: absolute;
        width: 300px;
        height: 300px;
        background: radial-gradient(circle, rgba(255, 138, 61, 0.15) 0%, transparent 70%);
        border-radius: 50%;
        z-index: -1;
        animation: pulse 4s ease-in-out infinite;
    }

    @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.4; }
        50% { transform: scale(1.4); opacity: 0.8; }
    }
</style>
</head>
<body>

<div id="particles-container"></div>

<div class="logo-container">
    <div class="glow-effect"></div>
    <img src="../src/components/logo.svg" alt="Bozorcha Logo" class="bozorcha-svg">
</div>

<script>
    const container = document.getElementById('particles-container');
    for (let i = 0; i < 50; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 4 + 1;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.left = Math.random() * 100 + '%';
        p.style.bottom = '10%';
        p.style.animationDuration = (Math.random() * 3 + 3) + 's';
        p.style.animationDelay = Math.random() * 5 + 's';
        container.appendChild(p);
    }
</script>

</body>
</html>
