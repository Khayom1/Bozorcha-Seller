<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <title>Bozorcha - Ae Masterpiece 2026</title>
    <style>
        :root {
            --orange: #ff8a3d;
            --gold: #ffca80;
            --deep: #d65a00;
            --bezier-ae: cubic-bezier(0.22, 1, 0.36, 1); /* Стандарти After Effects */
        }

        body {
            margin: 0;
            background: #020407;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            perspective: 2000px;
        }

        /* Контейнери асосӣ */
        .stage {
            position: relative;
            width: 450px;
            height: 450px;
            transform-style: preserve-3d;
        }

        /* Зарраҳои дурахшон */
        .particle {
            position: absolute;
            background: var(--gold);
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            animation: fly 4s infinite linear;
        }

        @keyframes fly {
            0% { transform: translate(0,0) scale(0); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: translate(var(--x), var(--y)) scale(1.5); opacity: 0; }
        }

        /* Аниматсияи Хатҳо (Phase 1) */
        .logo-stroke {
            fill: transparent;
            stroke: var(--orange);
            stroke-width: 2;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            opacity: 0;
            /* Хатҳо аз ҳар тараф меоянд */
            animation: 
                drawPath 2s var(--bezier-ae) forwards,
                flyIn 1.5s var(--bezier-ae) forwards;
        }

        /* Ҳар як қисм аз тарафи гуногун меояд */
        #path-roof { --tx: -200px; --ty: -150px; animation-delay: 0.2s; }
        #path-left { --tx: 200px; --ty: 100px; animation-delay: 0.4s; }
        #path-right { --tx: -100px; --ty: 250px; animation-delay: 0.6s; }

        @keyframes drawPath {
            to { stroke-dashoffset: 0; opacity: 1; }
        }

        @keyframes flyIn {
            0% { transform: translate(var(--tx), var(--ty)) rotate(45deg) scale(0.5); }
            100% { transform: translate(0, 0) rotate(0deg) scale(1); }
        }

        /* Рангшавии Мавҷӣ (Phase 2) */
        .logo-fill {
            opacity: 0;
            fill: url(#premiumGradient);
            clip-path: inset(100% 0 0 0); /* Аз поён ба боло пур мешавад */
        }

        .fill-roof { animation: liquidFill 1.5s var(--bezier-ae) forwards 2s; }
        .fill-left { animation: liquidFill 1.5s var(--bezier-ae) forwards 2.5s; }
        .fill-right { animation: liquidFill 1.5s var(--bezier-ae) forwards 3s; }

        @keyframes liquidFill {
            0% { clip-path: inset(100% 0 0 0); opacity: 0.5; }
            100% { clip-path: inset(0% 0 0 0); opacity: 1; }
        }

        /* Гурӯҳи гардиши 3D (Phase 3) */
        .rotator {
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            animation: 
                megaSpin 3.5s cubic-bezier(0.645, 0.045, 0.355, 1) forwards 4.5s,
                finalBreathe 5s ease-in-out infinite 8s;
        }

        /* 3 маротиба 360 дараҷа тоб хӯрдан (1080°) */
        @keyframes megaSpin {
            0% { transform: rotateY(0deg) rotateZ(0deg); }
            70% { transform: rotateY(1080deg) rotateZ(10deg); } /* Тез */
            100% { transform: rotateY(1080deg) rotateZ(0deg); } /* Суст дар охир */
        }

        @keyframes finalBreathe {
            0%, 100% { transform: scale(1) translateY(0); filter: drop-shadow(0 0 20px rgba(255,138,61,0.3)); }
            50% { transform: scale(1.05) translateY(-10px); filter: drop-shadow(0 0 40px rgba(255,138,61,0.6)); }
        }

        /* Дурахши замина */
        .glow {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(255,138,61,0.2) 0%, transparent 70%);
            filter: blur(50px);
            z-index: -1;
        }
    </style>

<script>
    // Генератори зарраҳо (Particles)
    const container = document.getElementById('particles');
    for (let i = 0; i < 60; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 4 + 1;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.left = '50%'; p.style.top = '50%';
        p.style.setProperty('--x', (Math.random() - 0.5) * 800 + 'px');
        p.style.setProperty('--y', (Math.random() - 0.5) * 800 + 'px');
        p.style.animationDelay = Math.random() * 5 + 's';
        container.appendChild(p);
    }
</script>

<script>

    const count = 50;

    for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        
        const size = Math.random() * 5 + 2;
        const left = Math.random() * 100;
        const duration = Math.random() * 4 + 3;
        const delay = Math.random() * 5;

        p.style.width = size + 'px';
        p.style.height = size + 'px';
