<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bozorcha - Premium Masterpiece</title>

<style>
    body {
        margin: 0;
        /* Заминаи сиёҳи амиқ бо градиенти нозук */
        background: radial-gradient(circle at center, #112240 0%, #050a12 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
        font-family: sans-serif;
    }

    /* Зарраҳои тиллоӣ дар паси логотип */
    #particles-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 1;
    }

    .particle {
        position: absolute;
        background: radial-gradient(circle, #ffca80 0%, transparent 70%);
        border-radius: 50%;
        opacity: 0;
        animation: floatUp infinite linear;
    }

    @keyframes floatUp {
        0% { transform: translateY(0) scale(0.5); opacity: 0; }
        20% { opacity: 0.8; }
        80% { opacity: 0.6; }
        100% { transform: translateY(-200px) scale(1.5); opacity: 0; }
    }

    /* Контейнери асосӣ барои ҳаракати шинокунанда (Floating) */
    .floating-wrapper {
        z-index: 2;
        animation: float 6s ease-in-out infinite;
    }

    /* Контейнери дуюм барои эффекти нафаскашӣ ва дурахш (Breathing & Glow) */
    .logoBox {
        width: 180px; /* Каме калонтар барои намоиши 4K */
        opacity: 0;
        /* Пайдоиши оҳиста ва баъдан нафаскашии беохир */
        animation: 
            appear 2s ease forwards,
            breathe 4s ease-in-out infinite 2.5s;
    }

    /* Аниматсияи кашидани хатҳо (Draw) - Суръати сусттар ва зеботар */
    #logo path {
        stroke: url(#orangeGradient); /* Истифодаи градиент ба ҷои ранги оддӣ */
        stroke-width: 2.5;
        fill: transparent;
        stroke-dasharray: 2000;
        stroke-dashoffset: 2000;
        animation: 
            draw 2.5s cubic-bezier(0.4, 0, 0.2, 1) forwards 0.5s,
            fillLogo 1.5s ease forwards 3s;
    }

    @keyframes draw {
        to { stroke-dashoffset: 0; }
    }

    @keyframes fillLogo {
        to {
            fill: url(#orangeGradient);
            stroke: transparent;
        }
    }

    @keyframes appear {
        to { opacity: 1; }
    }

    /* Эффекти нафаскашӣ: васеъшавӣ ва пурзӯр шудани дурахш */
    @keyframes breathe {
        0% { 
            transform: scale(1);
            filter: drop-shadow(0 0 15px rgba(255, 138, 61, 0.3));
        }
        50% { 
            transform: scale(1.06); /* Афзоиш ва тавсеаи бозор */
            filter: drop-shadow(0 0 35px rgba(255, 138, 61, 0.8));
        }
        100% { 
            transform: scale(1);
            filter: drop-shadow(0 0 15px rgba(255, 138, 61, 0.3));
        }
    }

    /* Эффекти шинокунанда: ҳаракати нарм ба боло ва поён */
    @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-15px); }
        100% { transform: translateY(0px); }
    }

</style>
</head>
<body>

<div id="particles-container"></div>

<div class="floating-wrapper">
    <div class="logoBox">
        <svg id="logo" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#ffb76b" />
                    <stop offset="50%" stop-color="#ff8a3d" />
                    <stop offset="100%" stop-color="#d65a00" />
                </linearGradient>
            </defs>
            
            </svg>
    </div>
</div>

<script>
    // Скрипт барои сохтани зарраҳои тиллоии шинокунанда (Cinematic Particles)
    const container = document.getElementById('particles-container');
    const particleCount = 40; // Миқдори зарраҳо

    for (let i = 0; i < particleCount; i++) {
        createParticle();
    }

    function createParticle() {
        const particle = document.createElement('div');
        particle.classList.add('particle');
        
        // Андоза, мавқеъ ва вақти тасодуфӣ барои ҳар як зарра
        const size = Math.random() * 6 + 2; 
        const left = Math.random() * 100; 
        const duration = Math.random() * 3 + 3; 
        const delay = Math.random() * 5; 
        
        particle.style.width = `${size}px`;
        particle.style.height = `${size}px`;
        particle.style.left = `${left}%`;
        particle.style.top = `${80 + Math.random() * 20}%`; // Аз поён оғоз мешавад
        particle.style.animationDuration = `${duration}s`;
        particle.style.animationDelay = `${delay}s`;
        
        container.appendChild(particle);
    }
</script>

</body>
</html>
